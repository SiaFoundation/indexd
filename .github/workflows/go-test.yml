name: Lint & Test
on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false # required on Windows
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          skip-cache: true
      - name: Validate OpenAPI spec
        run: |
          npm install --global swagger-spec-validator@5.0.0
          swagger-spec-validator openapi/*.yml
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_USER: indexd_test
      POSTGRES_PASSWORD: indexd_test
      POSTGRES_DB: indexd_test
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: indexd_test
          POSTGRES_PASSWORD: indexd_test
          POSTGRES_DB: indexd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26"
      - name: Cache GeoLite2 database
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: GeoLite2-City.mmdb
          key: geolite2-city-mmdb-2026-04
      - name: Test
        uses: n8maninger/action-golang-test@aa292dc81b16d34406a9551e629e0cdca00d9418 # v2.2.1
        with:
          args: -race;-failfast
